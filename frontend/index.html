<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Builder</title>
</head>
<body>

<h1>AI Resume Builder + Job Fit Analyzer</h1>

<textarea id="cv" rows="15" cols="80"></textarea>
<br><br>

<button onclick="match()">Analyze</button>

<hr>

<div id="results"></div>

<script>
const API = "https://ai-resume-builder-job-fit-analyzer.onrender.com";

async function match() {
    const cv = document.getElementById("cv").value;

    const res = await fetch(`${API}/match`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ cv })
    });

    const data = await res.json();

    const results = document.getElementById("results");

    results.innerHTML = `
        <pre>${JSON.stringify(data, null, 2)}</pre>
    `;
}
</script>

</body>
</html>
