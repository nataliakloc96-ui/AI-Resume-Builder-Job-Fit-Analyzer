<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Analyzer</title>
</head>
<body>

<h1>Resume Analyzer</h1>

<textarea id="cv" rows="12" cols="80"></textarea>
<br>
<button onclick="match()">Match Jobs</button>

<div id="result"></div>

<script>
const API = "https://ai-resume-builder-job-fit-analyzer.onrender.com";


async function match() {
    const cv = document.getElementById("cv").value;

    const res = await fetch(`${API}/match`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ cv })
    });

    const data = await res.json();

    const results = document.getElementById("results");

    if (!results) {
        console.error("Missing #results div");
        return;
    }

    results.innerHTML = JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
